{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

<h2>

Participants

</h2>

<table class="table table-bordered">

<thead>

<tr>

<th>Name</th>

<th>Email</th>

<th>Status</th>

</tr>

</thead>

<tbody>

{% for booking in bookings %}

<tr>

<td>

{{ booking.user.name }}

</td>

<td>

{{ booking.user.email }}

</td>

<td>

{{ booking.status }}

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
