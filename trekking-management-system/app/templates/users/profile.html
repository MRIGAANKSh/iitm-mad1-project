{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow">

                <!-- Header -->
                <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">

                    <div class="d-flex align-items-center">

                        <a href="{{ url_for('user.dashboard') }}"
                           class="btn btn-light btn-sm me-3">

                            ←

                        </a>

                        <h3 class="mb-0">

                            My Profile

                        </h3>

                    </div>

                    <span class="badge bg-light text-dark">

                        {{ current_user.role|title }}

                    </span>

                </div>

                <!-- Body -->
                <div class="card-body">

                    <form method="POST">

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Full Name

                                </label>

                                <input
                                    type="text"
                                    name="name"
                                    class="form-control"
                                    value="{{ current_user.name }}"
                                    required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Email Address

                                </label>

                                <input
                                    type="email"
                                    name="email"
                                    class="form-control"
                                    value="{{ current_user.email }}"
                                    required>

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Phone Number

                            </label>

                            <input
                                type="text"
                                name="phone"
                                class="form-control"
                                value="{{ current_user.phone }}"
                                required>

                        </div>

                        <hr>

                        <div class="d-flex justify-content-between">

                            <button class="btn btn-success">

                                Save Changes

                            </button>

                            <a
                                href="{{ url_for('user.change_password') }}"
                                class="btn btn-warning">

                                Change Password

                            </a>

                        </div>

                    </form>

                </div>

                <!-- Footer -->
                <div class="card-footer text-muted">

                    <small>

                        Member since:
                        {{ current_user.created_at.strftime("%d %B %Y") }}

                    </small>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
