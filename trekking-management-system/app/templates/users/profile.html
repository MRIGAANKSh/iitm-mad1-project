{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-7">

<div class="card shadow">

<div class="card-header bg-success text-white">

<h3>My Profile</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label>Name</label>

<input
type="text"
name="name"
class="form-control"
value="{{ current_user.name }}"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
name="email"
class="form-control"
value="{{ current_user.email }}"
required>

</div>

<div class="mb-3">

<label>Phone</label>

<input
type="text"
name="phone"
class="form-control"
value="{{ current_user.phone }}"
required>

</div>

<button
class="btn btn-success">

Save Changes

</button>

</form>

</div>

</div>

</div>

</div>

</div>

{% endblock %}
