{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h2>My Bookings</h2>

    <table class="table table-bordered">

        <thead>

            <tr>

                <th>Trek</th>

                <th>Booking Date</th>

                <th>Status</th>

                <th>Action</th>

            </tr>

        </thead>

        <tbody>

            {% for booking in bookings %}

            <tr>

                <td>{{ booking.trek.name }}</td>

                <td>{{ booking.bookings_date.strftime("%d-%m-%Y") }}</td>

                <td>{{ booking.status }}</td>

                <td>

                    {% if booking.status == "Booked" %}

                    <a class="btn btn-danger btn-sm" href="{{ url_for('user.cancel_booking', booking_id=booking.id) }}">

                        Cancel

                    </a>

                    {% endif %}

                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
