{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="text-center mb-4">
                    Login
                </h3>
                <form method="POST">
                    <div class="mb-3">
                        <label>Email</label>

                        <input type="email" class="form-control" name="email" required>

                    </div>
                    <button class="btn btn-primary w-100">Login</button>

                </form>
                <hr>
                <a href="/register">
                    Create Account
                </a>
            </div>
        </div>

    </div>

</div>
{%endblock%}
