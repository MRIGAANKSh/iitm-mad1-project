{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body">

                <h3 class="text-center mb-4">
                    Login
                </h3>

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input
                            type="email"
                            class="form-control"
                            name="email"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input
                            type="password"
                            class="form-control"
                            name="password"
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Login
                    </button>

                </form>

                <hr>

                <p class="text-center">
                    Don't have an account?
                    <a href="{{ url_for('auth.register') }}">
                        Create Account
                    </a>
                </p>

            </div>
        </div>
    </div>
</div>

{% endblock %}
