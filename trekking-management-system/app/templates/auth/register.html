{% extends 'base.html' %}

{% block content %}

<div class="container py-5">
    <div class="row justify-content-center">

        <div class="col-lg-5 col-md-7">

            <div class="card border-0 shadow-lg rounded-4">

                <div class="card-body p-5">

                    <div class="text-center mb-4">
                        <h2 class="fw-bold mb-2">Create Account</h2>
                        <p class="text-muted mb-0">
                            Join the Trekking Management System
                        </p>
                    </div>

                    <form method="POST">

                        <!-- Name -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                Full Name
                            </label>
                            <input
                                type="text"
                                name="name"
                                class="form-control"
                                placeholder="Enter your full name"
                                required>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                Email Address
                            </label>
                            <input
                                type="email"
                                name="email"
                                class="form-control"
                                placeholder="example@gmail.com"
                                required>
                        </div>

                        <!-- Phone -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                Phone Number
                            </label>
                            <input
                                type="tel"
                                name="phone"
                                class="form-control"
                                placeholder="9876543210"
                                required>
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                Password
                            </label>
                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                placeholder="Create a password"
                                required>
                        </div>

                        <!-- Role -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                Register As
                            </label>

                            <select
                                name="role"
                                class="form-select">

                                <option value="user">
                                    Trekker
                                </option>

                                <option value="staff">
                                    Trek Staff
                                </option>

                            </select>
                        </div>

                        <!-- Button -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-success btn-lg">
                                Create Account
                            </button>
                        </div>

                    </form>

                    <hr class="my-4">

                    <p class="text-center text-muted mb-0">
                        Already have an account?
                        <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-semibold">
                            Login here
                        </a>
                    </p>

                </div>

            </div>

        </div>

    </div>
</div>

{% endblock %}
