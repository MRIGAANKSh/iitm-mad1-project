{% extends 'admin/layout.html' %}

{% block admin_content %}

<h2>Edit Trek</h2>

<form method="POST">

    <div class="mb-3">
        <label>Name</label>
        <input
            class="form-control"
            name="name"
            value="{{ trek.name }}"
            required>
    </div>

    <div class="mb-3">
        <label>Location</label>
        <input
            class="form-control"
            name="location"
            value="{{ trek.location }}"
            required>
    </div>

    <div class="mb-3">
        <label>Difficulty</label>

        <select class="form-select" name="difficulty">
            <option value="Easy"
                {% if trek.difficulty == 'Easy' %}selected{% endif %}>
                Easy
            </option>

            <option value="Moderate"
                {% if trek.difficulty == 'Moderate' %}selected{% endif %}>
                Moderate
            </option>

            <option value="Hard"
                {% if trek.difficulty == 'Hard' %}selected{% endif %}>
                Hard
            </option>
        </select>
    </div>

    <div class="mb-3">
        <label>Duration (Days)</label>
        <input
            type="number"
            class="form-control"
            name="duration"
            value="{{ trek.duration }}"
            required>
    </div>

    <div class="mb-3">
        <label>Available Slots</label>
        <input
            type="number"
            class="form-control"
            name="slots"
            value="{{ trek.slots }}"
            required>
    </div>

    <div class="mb-3">
        <label>Description</label>
        <textarea
            class="form-control"
            name="description">{{ trek.description }}</textarea>
    </div>

    <div class="mb-3">
        <label>Start Date</label>
        <input
            type="date"
            class="form-control"
            name="start_date"
            value="{{ trek.start_date }}"
            required>
    </div>

    <div class="mb-3">
        <label>End Date</label>
        <input
            type="date"
            class="form-control"
            name="end_date"
            value="{{ trek.end_date }}"
            required>
    </div>

    <button type="submit" class="btn btn-primary">
        Update Trek
    </button>

    <a href="{{ url_for('admin.manage_treks') }}" class="btn btn-secondary">
        Cancel
    </a>

</form>

{% endblock %}
